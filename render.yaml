services:
  - type: web
    name: vinyl-collection-manager
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: gunicorn -c gunicorn.conf.py barcode_scanner.server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: "20"
      - key: FLASK_ENV
        value: production
      # Flush stdout so application logs appear in Render in real time.
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DISCOGS_TOKEN
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        value: https://vinyl-collection-manager.onrender.com/api/spotify/callback
      - key: API_URL
        value: https://vinyl-collection-manager.onrender.com
      - key: SYNC_SECRET_KEY
        generateValue: true
      # Anthropic API key for the photo-recognition feature (Add → Identify by photo).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
